<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biberbau Garten-Planer v4.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ========== RESET & BASE ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #f5ede0;
  --bg-card: #fffaf3;
  --bg-card-hover: #fff4e8;
  --bg-input: #fef8ee;
  --border: #ddd0b8;
  --border-light: #c8b898;
  --text: #3a2a18;
  --text-dim: #7a6250;
  --text-muted: #a89278;
  --accent: #b85c30;
  --accent-glow: #c87040;
  --accent-soft: rgba(184, 92, 48, 0.10);
  --green: #4a7a32;
  --green-soft: rgba(74, 122, 50, 0.15);
  --red: #a03828;
  --red-soft: rgba(160, 56, 40, 0.10);
  --warn: #c07820;
  --cell-empty: #faf3e5;
  --cell-filled: #d8eaca;
  --radius: 8px;
  --radius-lg: 14px;
  --shadow: 0 2px 12px rgba(100,70,30,0.10);
  --font-display: 'Josefin Sans', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}

html { font-size: 15px; }
body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}

/* ========== HEADER ========== */
.header {
  padding: 1.2rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  background: linear-gradient(180deg, #eedfc8 0%, var(--bg-deep) 100%);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 {
  font-family: var(--font-display);
  font-size: 1.6rem;
  color: var(--accent);
  letter-spacing: 0.08em;
  font-weight: 700;
  text-transform: uppercase;
}
.header h1 span { font-size: 1.1rem; color: var(--text-dim); margin-left: 0.4rem; font-family: var(--font-body); font-weight: 400; }
.header-actions { display: flex; gap: 0.6rem; align-items: center; }
.sync-indicator {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  transition: background 0.3s;
}
.sync-indicator.syncing { background: var(--accent); animation: pulse 1s infinite; }
.sync-indicator.error { background: var(--red); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ========== BUTTONS ========== */
.btn {
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 500;
  padding: 0.5rem 1rem;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { background: var(--bg-card-hover); border-color: var(--border-light); }
.btn:active { transform: scale(0.97); }
.btn-accent {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff8f0;
  font-weight: 600;
}
.btn-accent:hover { background: var(--accent-glow); }
.btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; }
.btn-danger { border-color: var(--red); color: var(--red); }
.btn-danger:hover { background: var(--red-soft); }
.btn-icon {
  width: 2rem; height: 2rem; padding: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
}

/* ========== LAYOUT ========== */
.app { max-width: 1200px; margin: 0 auto; padding: 1rem; }
.toolbar {
  display: flex; gap: 0.5rem; flex-wrap: wrap;
  margin-bottom: 1.2rem; align-items: center;
}
.group-section { margin-bottom: 2rem; }
.group-title {
  font-family: var(--font-display);
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 0.8rem;
  padding-bottom: 0.3rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.group-title::before { content: ''; display: block; width: 3px; height: 1em; background: var(--accent); border-radius: 2px; }
.beete-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 0.75rem;
}

/* ========== BEET CARD ========== */
.beet-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 0.75rem;
  box-shadow: var(--shadow);
  transition: border-color 0.2s;
}
.beet-card:hover { border-color: var(--border-light); }
.beet-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.8rem;
}
.beet-name {
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--accent);
}
.beet-meta {
  font-size: 0.75rem;
  color: var(--text-muted);
}
.beet-actions { display: flex; gap: 0.3rem; }

/* ========== GRID ========== */
.grid-container {
  display: inline-grid;
  gap: 3px;
}
.grid-cell {
  width: 44px;
  height: 44px;
  background: var(--cell-empty);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.7rem;
  transition: all 0.12s;
  position: relative;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.grid-cell:hover { border-color: var(--accent); background: var(--accent-soft); }
.grid-cell.filled {
  background: var(--cell-filled);
  border-color: var(--green);
}
.grid-cell.filled:hover { border-color: var(--accent-glow); }
.grid-corner {
  width: 18px;
  height: 18px;
}
.grid-col-label {
  width: 44px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.62rem;
  font-weight: 700;
  color: var(--text-muted);
  font-family: var(--font-display);
  letter-spacing: 0.04em;
}
.grid-row-label {
  width: 18px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.62rem;
  font-weight: 700;
  color: var(--text-muted);
  font-family: var(--font-display);
}
.grid-cell .toxic-dot {
  position: absolute;
  top: 2px;
  right: 2px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--red);
}

/* ========== MODAL ========== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(80,50,20,0.35);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  animation: fadeIn 0.15s;
}
@keyframes fadeIn { from { opacity: 0; } }
.modal {
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  max-width: 440px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 8px 40px rgba(80,50,20,0.18);
}
.modal h2 {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 1rem;
}
.modal label {
  display: block;
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-bottom: 0.25rem;
  margin-top: 0.8rem;
}
.modal label:first-of-type { margin-top: 0; }
.modal input, .modal textarea, .modal select {
  width: 100%;
  padding: 0.5rem 0.7rem;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.9rem;
}
.modal input:focus, .modal textarea:focus, .modal select:focus {
  outline: none;
  border-color: var(--accent);
}
.modal textarea { resize: vertical; min-height: 60px; }
.modal-buttons {
  display: flex;
  gap: 0.5rem;
  justify-content: flex-end;
  margin-top: 1.2rem;
}

/* ========== PLANT PICKER ========== */
.plant-picker {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  margin: 0.8rem 0;
}
.plant-option {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 0.4rem 0.2rem;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.12s;
  font-size: 0.7rem;
  color: var(--text-dim);
}
.plant-option:hover { border-color: var(--accent); background: var(--accent-soft); }
.plant-option.selected { border-color: var(--green); background: var(--green-soft); }
.plant-option .emoji { font-size: 1.4rem; }
.plant-option .toxic-badge { color: var(--red); font-size: 0.6rem; }

/* ========== CONFIG BANNER ========== */
.config-banner {
  background: var(--red-soft);
  border: 1px solid var(--red);
  border-radius: var(--radius);
  padding: 1rem;
  margin-bottom: 1rem;
  font-size: 0.85rem;
}
.config-banner code {
  background: var(--bg-input);
  padding: 0.15rem 0.4rem;
  border-radius: 3px;
  font-size: 0.8rem;
  word-break: break-all;
}

/* ========== TOAST ========== */
.toast {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 0.6rem 1.2rem;
  font-size: 0.85rem;
  box-shadow: 0 4px 20px rgba(80,50,20,0.15);
  z-index: 300;
  animation: toastIn 0.2s, toastOut 0.3s 2.2s forwards;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } }
@keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(10px); } }

/* ========== RESPONSIVE ========== */
@media (max-width: 600px) {
  .header h1 { font-size: 1.1rem; }
  .header h1 span { display: none; }
  .app { padding: 0.6rem; }
  .beete-grid { grid-template-columns: 1fr; gap: 0.5rem; }
  .plant-picker { grid-template-columns: repeat(3, 1fr); }
  .modal { padding: 1rem; }
  .grid-cell { width: 38px; height: 38px; font-size: 1.4rem; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🦫 Biberbau <span>Garten-Planer v4.0</span></h1>
  <div class="header-actions">
    <div class="sync-indicator" id="syncDot" title="Sync-Status"></div>
    <button class="btn btn-sm" onclick="loadAll()" title="Neu laden">↻</button>
  </div>
</div>

<div class="app" id="app">
  <div class="config-banner" id="configBanner" style="display:none">
    ⚠️ <strong>Apps Script URL fehlt.</strong> Bitte trage deine Google Apps Script Web-App-URL unten ein:<br>
    <label style="margin-top:0.5rem">
      <input type="text" id="apiUrlInput" placeholder="https://script.google.com/macros/s/…/exec" style="margin-top:0.3rem">
    </label>
    <button class="btn btn-accent btn-sm" style="margin-top:0.5rem" onclick="saveApiUrl()">Speichern</button>
  </div>

  <div class="toolbar">
    <button class="btn btn-accent" onclick="openAddBeetModal()">+ Neues Beet</button>
  </div>

  <div id="beeteContainer"></div>
</div>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const STORAGE_KEY = "biberbau_api_url";
let API_URL = localStorage.getItem(STORAGE_KEY) || "";
let DATA = { beete: [], pflanzen: [] };
let IS_SAVING = false;

// ============================================================
// PLANTS DATABASE
// toxic: true = 🔴 (Tödlich/Hochtoxisch für Cooper)
// ============================================================
const PLANTS = [
  { id: "tomate",       emoji: "🍅", name: "Tomate",        toxic: false },
  { id: "zucchini",     emoji: "🥒", name: "Zucchini",      toxic: false },
  { id: "gurke",        emoji: "🥒", name: "Gurke",         toxic: false },
  { id: "paprika",      emoji: "🫑", name: "Paprika/Chili",  toxic: false },
  { id: "kuerbis",      emoji: "🎃", name: "Kürbis",        toxic: false },
  { id: "physalis",     emoji: "🏮", name: "Physalis",      toxic: false },
  { id: "aubergine",    emoji: "🍆", name: "Aubergine",     toxic: false },
  { id: "zwiebel",      emoji: "🧅", name: "Zwiebel",       toxic: true }, 
  { id: "knoblauch",    emoji: "🧄", name: "Knoblauch",     toxic: true }, 
  { id: "lauch",        emoji: "🟡", name: "Lauch/Porree",  toxic: true }, 
  { id: "kartoffel",    emoji: "🥔", name: "Kartoffel",     toxic: false },
  { id: "karotte",      emoji: "🥕", name: "Karotte",       toxic: false },
  { id: "radieschen",   emoji: "🔴", name: "Radieschen",    toxic: false },
  { id: "rote_bete",    emoji: "🟣", name: "Rote Bete",     toxic: false },
  { id: "pastinake",    emoji: "🤍", name: "Pastinake",     toxic: false },
  { id: "sellerie",     emoji: "🥬", name: "Sellerie",      toxic: false },
  { id: "schwarzwurzel",emoji: "🥢", name: "Schwarzwurzel", toxic: false },
  { id: "topinambur",   emoji: "🌻", name: "Topinambur",    toxic: false },
  { id: "suesskartoffel",emoji: "🍠", name: "Süßkartoffel", toxic: false },
  { id: "meerrettich",  emoji: "🔥", name: "Meerrettich",   toxic: false },
  { id: "kopfsalat",    emoji: "🥬", name: "Kopfsalat",     toxic: false },
  { id: "feldsalat",    emoji: "🥗", name: "Feldsalat",     toxic: false },
  { id: "spinat",       emoji: "🍃", name: "Spinat",        toxic: false },
  { id: "mangold",      emoji: "🌿", name: "Mangold",       toxic: false },
  { id: "rucola",       emoji: "🥗", name: "Rucola",        toxic: false },
  { id: "kohl_weiss",   emoji: "⚪", name: "Weißkohl",      toxic: false },
  { id: "kohl_rot",     emoji: "🟣", name: "Rotkohl",       toxic: false },
  { id: "blumenkohl",   emoji: "🥦", name: "Blumenkohl",    toxic: false },
  { id: "brokkoli",     emoji: "🥦", name: "Brokkoli",      toxic: false },
  { id: "bohne",        emoji: "🫘", name: "Bohne",         toxic: true }, 
  { id: "erbse",        emoji: "🟢", name: "Erbse",         toxic: false },
  { id: "erdbeere",     emoji: "🍓", name: "Erdbeere",      toxic: false },
  { id: "himbeere",     emoji: "🍇", name: "Himbeere",      toxic: false },
  { id: "brombeere",    emoji: "🫐", name: "Brombeere",     toxic: false },
  { id: "johannisbeere",emoji: "🍒", name: "Johannisbeere", toxic: false },
  { id: "heidelbeere",  emoji: "🫐", name: "Heidelbeere",   toxic: false },
  { id: "stachelbeere", emoji: "🍈", name: "Stachelbeere",  toxic: false },
  { id: "holunder",     emoji: "🌳", name: "Holunder",      toxic: true }, 
  { id: "weintraube",   emoji: "🍇", name: "Weintraube",    toxic: true }, 
  { id: "schnittlauch", emoji: "🌱", name: "Schnittlauch",  toxic: true }, 
  { id: "rhabarber",    emoji: "🪴", name: "Rhabarber",     toxic: true }, 
  { id: "petersilie",   emoji: "🌿", name: "Petersilie",    toxic: false },
  { id: "minze",        emoji: "🍃", name: "Minze",         toxic: false },
  { id: "basilikum",    emoji: "🌿", name: "Basilikum",     toxic: false },
  { id: "baerlauch",    emoji: "🧄", name: "Bärlauch",      toxic: true }, 
  { id: "sonnenblume",  emoji: "🌻", name: "Sonnenblume",   toxic: false },
  { id: "hopfen",       emoji: "🍺", name: "Hopfen",        toxic: true }, 
  { id: "dill",         emoji: "🌿", name: "Dill",          toxic: false },
  { id: "sonstiges",    emoji: "🌱", name: "Sonstiges",     toxic: false },
];

function getPlant(id) {
  return PLANTS.find(p => p.id === id) || { id, emoji: "🌱", name: id, toxic: false };
}

// ============================================================
// API & HELPERS
// ============================================================
function setSyncState(state) {
  const dot = document.getElementById("syncDot");
  if(dot) dot.className = "sync-indicator" + (state ? " " + state : "");
}

function esc(str) {
  if (!str) return "";
  return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function toast(msg) {
  const root = document.getElementById("toastRoot");
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  root.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ============================================================
// CORE LOGIC
// ============================================================
async function loadAll() {
  if (!API_URL) {
    document.getElementById("configBanner").style.display = "block";
    return;
  }
  setSyncState("syncing");
  try {
    const r = await fetch(API_URL + "?action=getAll");
    const d = await r.json();
    if (d && !d.error) { DATA = d; render(); }
    setSyncState("");
  } catch (e) {
    setSyncState("error");
    console.error(e);
  }
}

function render() {
  const container = document.getElementById("beeteContainer");
  if (!DATA.beete.length) {
    container.innerHTML = '<p style="text-align:center;padding:3rem 0;color:var(--text-muted)">Keine Beete gefunden.</p>';
    return;
  }

  let html = '<div class="beete-grid">';
  DATA.beete.forEach(beet => {
    const w = Number(beet.width) || 4;
    const h = Number(beet.height) || 7;
    const plantsInBeet = DATA.pflanzen.filter(p => p.beet === beet.name && p.plant);
    
    html += `<div class="beet-card">
      <div class="beet-header">
        <div class="beet-name">${esc(beet.name)}</div>
        <div class="beet-meta">${w}x${h} · ${plantsInBeet.length} Pflanzen</div>
      </div>
      <div class="grid-container" style="grid-template-columns: 18px repeat(${w}, 44px);">
        <div class="grid-corner"></div>`;
    
    for(let c=0; c<w; c++) html += `<div class="grid-col-label">${String.fromCharCode(65+c)}</div>`;

    for(let r=0; r<h; r++) {
      html += `<div class="grid-row-label">${r+1}</div>`;
      for(let c=0; c<w; c++) {
        const cell = DATA.pflanzen.find(p => p.beet === beet.name && Number(p.col) === c && Number(p.row) === r);
        const pDef = cell ? getPlant(cell.plant) : null;
        const filled = pDef ? " filled" : "";
        const dot = (pDef && pDef.toxic) ? '<span class="toxic-dot"></span>' : "";
        html += `<div class="grid-cell${filled}" onclick="openCellModal('${esc(beet.name)}',${c},${r})">${pDef ? pDef.emoji : ""}${dot}</div>`;
      }
    }
    html += `</div></div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

function openCellModal(beetName, col, row) {
  const cell = DATA.pflanzen.find(p => p.beet === beetName && Number(p.col) === col && Number(p.row) === row);
  const currentPlantId = cell ? cell.plant : "";
  
  let pickerHtml = '<div class="plant-picker">';
  PLANTS.forEach(p => {
    const sel = p.id === currentPlantId ? " selected" : "";
    pickerHtml += `<div class="plant-option${sel}" onclick="saveCell('${esc(beetName)}',${col},${row},'${p.id}')">
      <span class="emoji">${p.emoji}</span>
      <span>${p.name}</span>
      ${p.toxic ? '<span class="toxic-badge">⚠️</span>' : ""}
    </div>`;
  });
  pickerHtml += `<div class="plant-option" onclick="saveCell('${esc(beetName)}',${col},${row},'')">❌ Leeren</div></div>`;

  document.getElementById("modalRoot").innerHTML = `
    <div class="modal-overlay" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <h2>Pflanze wählen (${String.fromCharCode(65+col)}${row+1})</h2>
        ${pickerHtml}
        <div class="modal-buttons"><button class="btn" onclick="closeModal()">Abbrechen</button></div>
      </div>
    </div>`;
}

async function saveCell(beet, col, row, plantId) {
  closeModal();
  setSyncState("syncing");
  try {
    await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({ action: "putPlant", beet, col, row, plant: plantId, variety: "" })
    });
    await loadAll();
    toast("Gespeichert");
  } catch (e) {
    setSyncState("error");
  }
}

function closeModal() { document.getElementById("modalRoot").innerHTML = ""; }

function saveApiUrl() {
  const val = document.getElementById("apiUrlInput").value.trim();
  if(val) {
    localStorage.setItem(STORAGE_KEY, val);
    API_URL = val;
    location.reload();
  }
}

// Init
loadAll();
</script>
</body>
</html>
